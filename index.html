<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>ClashPot</title>
	<style>
		html, body {background:#000;width:100%;height:100%;overflow:visible;padding:0;margin:0;}
		div#container {background:transparent !important;position:absolute;}
		div#container canvas {position:absolute;}
		div#container canvas[data-pixel-art="true"] {position:absolute;image-rendering:optimizeSpeed;image-rendering:-webkit-crisp-edges;image-rendering:-moz-crisp-edges;image-rendering:-o-crisp-edges;image-rendering:crisp-edges;image-rendering:-webkit-optimize-contrast;image-rendering:optimize-contrast;image-rendering:pixelated;-ms-interpolation-mode:nearest-neighbor;}
	</style>
</head>

<body>
	<div id="container">
		<canvas id="game-canvas" data-pixel-art=""></canvas>
                <script src="arcade-sdk-unity.js"></script>
		<script src="Build/ClashPot-WebglBuild.loader.js"></script>
		<script>
			var canvas = document.querySelector("#game-canvas");
			var config =
			{
				dataUrl: "Build/ClashPot-WebglBuild.data",
				frameworkUrl: "Build/ClashPot-WebglBuild.framework.js",
				codeUrl: "Build/ClashPot-WebglBuild.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "DefaultCompany",
				productName: "ClashPot",
				productVersion: "0.1.0",
			};
			var scaleToFit;
			try
			{
				scaleToFit = !!JSON.parse("");
			} catch (e) {
				scaleToFit = true;
			}
			
			function progressHandler(progress)
			{
				var percent = progress * 100 + '%';
				canvas.style.background = 'linear-gradient(to right, white, white ' + percent + ', transparent ' + percent + ', transparent) no-repeat center';
				canvas.style.backgroundSize = '100% 1rem';
			}
			
			function onResize()
			{
				var container = canvas.parentElement;
				var w;
				var h;

				if (scaleToFit)
				{
					w = window.innerWidth;
					h = window.innerHeight;

					var r = 1920 / 1080;
					if (w * r > window.innerHeight)
					{
						w = Math.min(w, Math.ceil(h / r));
					}
					h = Math.floor(w * r);
				} 
				else
				{
					w = 1080;
					h = 1920;
				}

				container.style.width = canvas.style.width = w + "px";
				container.style.height = canvas.style.height = h + "px";
				container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
				container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
			}
			
			createUnityInstance(canvas, config, progressHandler).then(function (instance)
			{
				window.unityInstance = instance; // ArcadeX SDK needs this to call SendMessage into Unity
				canvas = instance.Module.canvas;
				onResize();
			});
			
			window.addEventListener('resize', onResize);
			onResize();

			// Style for mobile devices.
			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent))
			{
				// Fill the whole browser client area with the game canvas.
				const meta = document.createElement('meta');
				meta.name = 'viewport';
				meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
				document.getElementsByTagName('head')[0].appendChild(meta);
			}
		</script>
	</div>

		<!-- ClashPot Escrow Bridge -->
		<!-- 
		  Ye script iframe (game) aur parent (ArcadeX platform) ke beech
		  CLASHPOT_JOIN messages relay karta hai.
		  
		  Flow:
		  1. Unity → arcade_joinEscrow() → arcade-sdk-unity.js → postMessage(CLASHPOT_JOIN) [parent ko]
		  2. Platform page: wallet se join() tx kare → postMessage(CLASHPOT_JOIN_SUCCESS, _platform:true) [iframe ko]
		  3. Ye script: parent se message receive karke ArcadeSDK._onMessage route karta hai
		     jo Unity ko OnEscrowJoinSuccess/Failed bhejta hai
		-->
		<script>
		  window.addEventListener('message', function(e) {
		    var d = e.data;
		    if (!d) return;

		    // Parent platform se aane wale responses
		    if (d._platform && (
		      d.type === 'CLASHPOT_JOIN_SUCCESS' ||
		      d.type === 'CLASHPOT_JOIN_FAILED'  ||
		      d.type === 'CLASHPOT_SETTLE_SUCCESS' ||
		      d.type === 'PLAYER_INFO' ||
		      d.type === 'TRANSACTION_SUCCESS' ||
		      d.type === 'TRANSACTION_FAILED'
		    )) {
		      // ArcadeSDK ka _onMessage directly call karo
		      if (window.ArcadeSDK && typeof window.ArcadeSDK._onMessage === 'function') {
		        window.ArcadeSDK._onMessage(e);
		      }
		      return;
		    }

		    // Game se parent ko relay karo (CLASHPOT_JOIN, GET_PLAYER_INFO, etc.)
		    if (d._arcadex && window.parent && window.parent !== window) {
		      window.parent.postMessage(d, '*');
		    }
		  });
		</script>
</body>

</html>
