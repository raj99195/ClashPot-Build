<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>ClashPot</title>
	<style>
		html, body {background:#000;width:100%;height:100%;overflow:visible;padding:0;margin:0;}
		div#container {background:transparent !important;position:absolute;}
		div#container canvas {position:absolute;}
		div#container canvas[data-pixel-art="true"] {position:absolute;image-rendering:optimizeSpeed;image-rendering:-webkit-crisp-edges;image-rendering:-moz-crisp-edges;image-rendering:-o-crisp-edges;image-rendering:crisp-edges;image-rendering:-webkit-optimize-contrast;image-rendering:optimize-contrast;image-rendering:pixelated;-ms-interpolation-mode:nearest-neighbor;}
	</style>
</head>

<body>
	<div id="container">
		<canvas id="game-canvas" data-pixel-art=""></canvas>

		<!--
		  Socket.IO client — LOCAL file se, CDN se NAHI.

		  ⚠️ Pehle ye jslib se runtime pe cdn.socket.io se load hota tha, aur
		     playarcadex.in pe block ho gaya:
		         "socket.io client load failed: https://cdn.socket.io/4.7.5/socket.io.min.js"
		     Uske baad socket kabhi connect nahi hua aur join_room bhi nahi gaya.
		     CSP / ad-blocker / network — kuch bhi wajah ho sakti hai.

		  Ab file build ke saath hi ship hoti hai (same origin), toh block hone ka
		  sawaal hi nahi. Version server ke socket.io se match hona chahiye (v4).
		-->
		<script src="socket.io.min.js"></script>

		<!-- ArcadeX SDK — Unity ke loader se PEHLE load hona chahiye -->
		<script src="arcade-sdk-unity.js"></script>

		<!--
		  ⚠️ BUILD NAAM
		  Unity output files ka naam build FOLDER ke naam se rakhta hai.
		  Abhi build ka naam "ClashPot-Build" hai, isliye files:
		      Build/ClashPot-Build.loader.js
		      Build/ClashPot-Build.data
		      Build/ClashPot-Build.framework.js
		      Build/ClashPot-Build.wasm

		  Agar aage kabhi alag naam ke folder me build karo, to ye 4 jagah
		  neeche update karni padengi — warna 404 aayega aur
		  "createUnityInstance is not defined" error milega.
		-->
		<script src="Build/ClashPot-Build.loader.js"></script>

		<script>
			var canvas = document.querySelector("#game-canvas");
			var config =
			{
				dataUrl: "Build/ClashPot-Build.data",
				frameworkUrl: "Build/ClashPot-Build.framework.js",
				codeUrl: "Build/ClashPot-Build.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "DefaultCompany",
				productName: "ClashPot",
				productVersion: "0.1.0",
			};
			var scaleToFit;
			try
			{
				scaleToFit = !!JSON.parse("");
			} catch (e) {
				scaleToFit = true;
			}

			function progressHandler(progress)
			{
				var percent = progress * 100 + '%';
				canvas.style.background = 'linear-gradient(to right, white, white ' + percent + ', transparent ' + percent + ', transparent) no-repeat center';
				canvas.style.backgroundSize = '100% 1rem';
			}

			function onResize()
			{
				var container = canvas.parentElement;
				var w;
				var h;

				if (scaleToFit)
				{
					w = window.innerWidth;
					h = window.innerHeight;

					var r = 1920 / 1080;
					if (w * r > window.innerHeight)
					{
						w = Math.min(w, Math.ceil(h / r));
					}
					h = Math.floor(w * r);
				}
				else
				{
					w = 1080;
					h = 1920;
				}

				container.style.width = canvas.style.width = w + "px";
				container.style.height = canvas.style.height = h + "px";
				container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
				container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
			}

			createUnityInstance(canvas, config, progressHandler).then(function (instance)
			{
				window.unityInstance = instance; // ArcadeX SDK ko SendMessage ke liye ye chahiye
				canvas = instance.Module.canvas;
				onResize();
			}).catch(function (err) {
				console.error("[ClashPot] Unity load failed:", err);
			});

			window.addEventListener('resize', onResize);
			onResize();

			// Style for mobile devices.
			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent))
			{
				const meta = document.createElement('meta');
				meta.name = 'viewport';
				meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
				document.getElementsByTagName('head')[0].appendChild(meta);
			}
		</script>
	</div>
</body>

</html>
